# 工作流配置文件

# 数据库配置
database:
  type: "sqlite"
  path: "data/literature_hub.db"
  backup_dir: "data/backups"
  max_backups: 10
  backup_interval: 86400  # 秒（24小时）

# 搜索配置
search:
  # 默认搜索数据库
  databases:
    - "elsevier"
    - "arxiv"
    - "ieee"
    - "springer"

  # 搜索参数
  max_results: 100  # 每个数据库最大结果数
  parallel: true    # 并行搜索
  year_range:
    start: 2020
    end: 2024

  # 重试配置
  retry:
    max_attempts: 3
    delay: 1.0  # 秒

# 下载配置
download:
  download_dir: "data/pdfs"
  max_concurrent: 5
  timeout: 60  # 秒
  retry:
    max_attempts: 3
    delay: 2.0

  # 下载延迟（避免被封）
  delay_range:
    min: 1.0
    max: 3.0

# 分析配置
analysis:
  # AI 分析配置
  ai:
    model: "glm-4"
    temperature: 0.7
    max_tokens: 2000

    # 分析维度
    dimensions:
      - "innovation"   # 创新点
      - "motivation"   # 研究动机
      - "roadmap"      # 技术路线
      - "mechanism"    # 机理解析
      - "impact"       # 影响评估
      - "history"      # 历史脉络

  # 批处理配置
  batch:
    size: 10
    delay: 1.0  # 批次间延迟

  # 超时配置
  timeout: 120  # 秒

# 评分配置
scoring:
  # 权重配置
  weights:
    impact_factor: 0.7   # 影响因子权重
    time_decay: 0.3      # 时间衰减权重

  # 时间衰减参数
  decay:
    half_life: 3  # 年（半衰期）
    current_year: 2024

# 分类配置
classification:
  # 技术领域
  domains:
    - "Aerodynamic Optimization"
    - "Wake Effects"
    - "Blade Design"
    - "Turbulence Modeling"
    - "Control Systems"
    - "Wind Farm Layout"

  # 分类方法
  method: "hybrid"  # keyword | ai | hybrid

# PPT 生成配置
ppt:
  templates_dir: "templates/ppt"
  default_template: "academic_standard"

  # 输出配置
  output:
    dir: "output/ppt"
    format: "pptx"

  # 版本控制
  version_control:
    enabled: true
    max_versions: 20

# 缓存配置
cache:
  enabled: true
  dir: "data/cache"
  ttl: 3600  # 秒（1小时）
  max_size: 1000  # MB

# 日志配置
logging:
  level: "INFO"  # DEBUG | INFO | WARNING | ERROR
  dir: "logs"
  max_size: 10  # MB
  backup_count: 5

  # 控制台输出
  console:
    enabled: true
    colorize: true

# 并发控制
concurrency:
  max_workers: 5
  semaphore_limit: 5

# MinerU API 配置
mineru:
  # API 地址
  api_base: "https://mineru.net/api/v4"

  # Token 配置（可选，留空则自动从私人信息文件夹读取）
  # 优先级: 配置文件 > d:/xfs/phd/github项目/.私人信息/mineru_token.txt > d:/xfs/phd/.私人信息/mineru_token.txt
  token: ""

  # 模型版本: pipeline（传统方法）、vlm（视觉语言模型，推荐）、MinerU-HTML（HTML专用）
  model_version: "vlm"

  # 解析选项
  enable_formula: true   # 启用公式识别
  enable_table: true      # 启用表格识别
  is_ocr: false           # 启用 OCR（扫描件）
  language: "ch"          # 文档语言

  # 超时配置
  timeout: 30             # 请求超时（秒）
  upload_timeout: 300     # 上传超时（秒）
  poll_timeout: 600       # 轮询超时（秒）
  poll_interval: 10       # 轮询间隔（秒）
  max_retries: 3          # 最大重试次数

# GUI 配置
gui:
  theme: "default"
  window_size:
    width: 1200
    height: 800

  # 面板配置
  panels:
    literature_list:
      visible: true
      columns:
        - "title"
        - "authors"
        - "year"
        - "journal"
        - "score"
        - "status"

    analysis_progress:
      visible: true
      refresh_interval: 1000  # 毫秒
